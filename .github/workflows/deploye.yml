# Build and push the backend API Docker image to Docker Hub.
# Repository root must be the backend folder (Dockerfile + package.json here).
#
# Required GitHub repository secrets (add in Settings → Secrets and variables → Actions):
#   ACCESS_TOKEN — Docker Hub access token (PAT) with Read & Write; used as docker login password (preferred)
#   PASSWORD     — optional fallback if you use account password instead of a PAT
#
# Image name is fixed below (not derived from github.repository). Change DOCKER_IMAGE / DOCKER_USERNAME if you rename the Hub repo.

name: Build and deploy backend image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_USERNAME: abhiidockrgt
  DOCKER_IMAGE: abhiidockrgt/workforce-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.ACCESS_TOKEN || secrets.PASSWORD }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
